<div
  style="padding: 2rem; background: var(--color-background-tertiary); display: flex; flex-direction: column; align-items: center; gap: 1rem;">

  <table cellpadding="0" cellspacing="0" border="0" style="width:520px; background: var(--color-background-primary);
                border-left: 5px solid #2e8b35;
                border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0;
                overflow: hidden;">
    <tr>
      <!-- Logo -->
      <td style="padding: 18px 14px 18px 18px; vertical-align: middle; width: 145px;">
        <img src="https://i.ibb.co/tTrJRVHM/icon.png" alt="Mellis Distribution"
          style="width:135px; height:auto; display:block;" />
      </td>

      <!-- Séparateur vertical -->
      <td style="width:3px; padding:0; background: linear-gradient(to bottom, #2e8b35 0%, #b8960c 50%, #cc2222 100%);">
        &nbsp;</td>

      <!-- Infos contact -->
      <td style="padding: 18px 20px 18px 22px; vertical-align: middle;">

        <p style="margin:0 0 2px 0; font-size:15px; font-weight:600; color: var(--color-text-primary);
                  letter-spacing:0.3px; font-family: Georgia, serif;">
          Matthieu Heritiana Razafintsalama
        </p>

        <p style="margin:0 0 11px 0; font-size:11px; font-weight:700; color:#2e8b35;
                  text-transform:uppercase; letter-spacing:1.8px;">
          Développeur Odoo
        </p>

        <div style="width:38px; height:2px; background:#b8960c; margin-bottom:13px;"></div>

        <!-- Téléphone -->
        <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom:7px;">
          <tr>
            <td style="padding-right:7px; vertical-align:middle;">
              <svg width="13" height="13" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M6.62 10.79a15.053 15.053 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24c1.12.37 2.33.57 3.57.57a1 1 0 011 1V20a1 1 0 01-1 1C10.61 21 3 13.39 3 4a1 1 0 011-1h3.5a1 1 0 011 1c0 1.25.2 2.45.57 3.57a1 1 0 01-.24 1.01l-2.21 2.21z"
                  fill="#2e8b35" />
              </svg>
            </td>
            <td style="font-size:12.5px; color: var(--color-text-primary);">
              +261 38 47 003 65
            </td>
          </tr>
        </table>

        <!-- Email -->
        <table cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td style="padding-right:7px; vertical-align:middle;">
              <svg width="13" height="13" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zm0 2l-8 5-8-5h16zm0 12H4V8l8 5 8-5v10z"

            <td style="font-size:12.5px; color: var(--color-text-primary);">
              info.dev@mellis.mg
            </td>
          </tr>
        </table>

      </td>
    </tr>

    <!-- Bande bas -->
    <tr>
      <td colspan="3" style="background: linear-gradient(90deg, #2e8b35 0%, #246e2a 55%, #b8960c 100%);
                 padding: 7px 20px;">
        <span style="font-size:9.5px; color:rgba(255,255,255,0.88);
                     letter-spacing:1.2px; text-transform:uppercase;">
          Mellis Distribution
        </span>
      </td>
    </tr>
